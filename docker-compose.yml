services:
  fourfold-parallel:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      - VITE_BIBLE_API_URL=${VITE_BIBLE_API_URL}
      - VITE_BIBLE_API_PORT=${VITE_BIBLE_API_PORT}
      # Used by vite.config.js proxy (server-side Node process, resolves via Docker DNS)
      - VITE_BIBLE_API_INTERNAL_URL=${VITE_BIBLE_API_INTERNAL_URL}
      - VITE_REDIS_HOST=redis
      - VITE_REDIS_PORT=${VITE_REDIS_PORT:-6379}
    volumes:
      - ~/.ssh:/root/.ssh:ro
    depends_on:
      - redis
      - bible-api
    networks:
      - fourfold-parallel-network

  bible-api:
    build:
      context: .
      dockerfile: Dockerfile.bible-api
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    networks:
      - fourfold-parallel-network

  redis:
    image: redis
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - fourfold-parallel-network

  redis-commander:
    image: rediscommander/redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - '8088:8081'
    networks:
      - fourfold-parallel-network

volumes:
  redis_data:

networks:
  fourfold-parallel-network:
    external: true
